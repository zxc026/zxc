<!DOCTYPE html>
{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <title>PC Craft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; }
        nav { background: white; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        nav a { margin-right: 20px; text-decoration: none; color: #3b82f6; font-weight: bold; }
        .container { max-width: 1280px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'configurator' %}">Конфигуратор</a>
    <a href="{% url 'catalog' %}">Каталог</a>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
