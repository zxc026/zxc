<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Craft — Конфигуратор ПК</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'builder/css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="logo-area">
                <i class="fas fa-microchip logo-icon"></i>
                <span class="logo-text">PC Craft</span>
            </div>
            <div class="nav-links">
                <a href="{% url 'configurator' %}">Конфигуратор</a>
                <a href="{% url 'catalog' %}">Каталог</a>
                <a href="{% url 'my_builds' %}">Мои сборки</a>
                <a href="{% url 'about' %}">О проекте</a>
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <i class="fas fa-dragon"></i> PC Craft — конфигуратор с проверкой совместимости
    </footer>
</body>
</html>
